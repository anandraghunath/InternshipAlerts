name: Internship Monitor

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install requests

      - name: Download previous README artifact
        uses: actions/download-artifact@v4
        with:
          name: last-readme
        continue-on-error: true  # Allows it to proceed if this is the first run

      - name: Run monitor script
        env:
          FROM_EMAIL_ADDRESS: ${{ secrets.FROM_EMAIL_ADDRESS }}
          FROM_EMAIL_PASSWORD: ${{ secrets.FROM_EMAIL_PASSWORD }}
          TO_EMAIL_ADDRESS: ${{ secrets.TO_EMAIL_ADDRESS }}
        run: python monitor.py

      - name: Upload updated README
        uses: actions/upload-artifact@v4
        with:
          name: last-readme
          path: last_readme.md
